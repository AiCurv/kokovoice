# Nginx reverse proxy for Kokovoicebot webhook on Oracle VM (130.210.12.9)
# This provides TLS termination for the Telegram webhook endpoint
# and the GitHub Actions completion/upload endpoints.

upstream kokovoicebot {
    server 127.0.0.1:8443;
}

server {
    listen 443 ssl;
    server_name 130.210.12.9;

    # Use self-signed cert initially; replace with Let's Encrypt if you have a domain
    ssl_certificate /etc/nginx/ssl/kokovoicebot.crt;
    ssl_certificate_key /etc/nginx/ssl/kokovoicebot.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Allow up to 50 MB for audio file uploads (matches Telegram sendAudio limit)
    client_max_body_size 50M;

    # Telegram webhook endpoint
    location /webhook {
        proxy_pass http://kokovoicebot/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Completion callback endpoint (GitHub Actions -> Oracle) — small JSON
    location /completion {
        proxy_pass http://kokovoicebot/completion;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Audio upload endpoint (GitHub Actions -> Oracle) — binary multipart
    location /upload/audio {
        proxy_pass http://kokovoicebot/upload/audio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    # Health check
    location /health {
        proxy_pass http://kokovoicebot/health;
    }

    # Block everything else
    location / {
        return 403;
    }
}

# Redirect HTTP to HTTPS (for certbot challenges)
server {
    listen 80;
    server_name 130.210.12.9;

    # Allow certbot ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
